seed: 42
data:
  stage1_dir: None
  embedding_files:
    train: stage1_train_embeddings.npz
    val: stage1_val_embeddings.npz
    test: stage1_test_embeddings.npz
  metadata_csv: stage1_flow_metadata.csv
  timestamp_col: flow_start_timestamp_us
  source_col: source_id
  destination_col: destination_id

context:
  method: time_only
  window_size: 128
  include_target: true
  context_policy: split_isolated
  endpoint_mode: same_endpoint
  deduplicate: true

model:
  model_type: lstm
  d_model: null
  lstm_hidden_dim: 256
  lstm_num_layers: 2
  lstm_bidirectional: false
  dropout: 0.3
  num_classes: 2
  pooling: last

training:
  epochs: 500
  batch_size: 64
  lr: 0.0003
  weight_decay: 0.0001
  patience: 20
  metric_for_best: val_f1_label1
  use_weighted_sampler: true
  class_weighted_loss: true
  loss_type: focal
  focal_gamma: 2.0
  label_smoothing: 0.0
  grad_clip_norm: 1.0
  threshold: 0.5
  auto_threshold: true
  threshold_metric: f1
  threshold_min: 0.01
  threshold_max: 0.99
  threshold_steps: 99
  device: auto