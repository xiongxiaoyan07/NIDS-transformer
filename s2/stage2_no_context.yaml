seed: 42
data:
  stage1_dir: None
  embedding_files:
    train: stage1_train_embeddings.npz
    val: stage1_val_embeddings.npz
    test: stage1_test_embeddings.npz
  metadata_csv: stage1_flow_metadata.csv
  timestamp_col: flow_start_timestamp_us
  source_col: source_id
  destination_col: destination_id

context:
  method: time_only
  window_size: 0
  include_target: true
  context_policy: split_isolated
  deduplicate: true

model:
  model_type: no_context_mlp
  d_model: null
  # Transformer parameters
  nhead: 8
  num_layers: 2
  dim_feedforward: 512
  dropout: 0.3
  num_classes: 2
  # last / mean / attention
  pooling: last
  use_positional_encoding: false
  max_len: 512
  #  cls_head - 1/2/3 how many  nn.Linear layers
  cls_head: 3

training:
  epochs: 500
  batch_size: 64
  lr: 0.0003
  weight_decay: 0.0001
  patience: 20
  metric_for_best: f1_label1
  use_weighted_sampler: true
  class_weighted_loss: true
  loss_type: focal
  focal_gamma: 2.0
  label_smoothing: 0.0
  grad_clip_norm: 1.0
  threshold: 0.5
  auto_threshold: true
  threshold_metric: f1
  threshold_min: 0.01
  threshold_max: 0.99
  threshold_steps: 99
  device: auto