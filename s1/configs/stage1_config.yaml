# Stage1 configuration.
# 你可以通过修改这个文件决定 flow-level 和 packet-level 到底用哪些字段。

seed: 42
strict_schema: false

data:
  flow_id_col: flow_id
  label_col: label
  packet_time_col: timestamp_us
  packet_iat_col: flow_iat_us

sequence:
  max_seq_len: 40
  # options: head, head_tail, random
  strategy: head

split:
  train_size: 0.70
  val_size: 0.10
  test_size: 0.20
  stratify: true

features:
  # 绝对时间字段一般不推荐作为模型输入，避免数据泄漏。
  # flow_iat_us 会被转为 log1p 后用于 temporal feature 和 time-aware encoding。
  packet:
    categorical:
      - ip_version
      - protocol
      - l7_proto
      - icmp_type
      - icmp_code
    numerical:
      - pkt_len
      - ip_len
      - payload_len
      - ttl_or_hop_limit
      - tcp_window
      - tcp_header_len
      - udp_len
      - log_flow_iat_us
    binary:
      - direction
      - has_tcp
      - has_udp
      - has_icmp
      - tcp_fin
      - tcp_syn
      - tcp_rst
      - tcp_psh
      - tcp_ack_flag
      - tcp_urg
      - tcp_ece
      - tcp_cwr

  # flow-level 字段完全可配置。
  # 不建议默认使用 source_ip / destination_ip，因为 IP one-hot 维度大且容易产生环境偏差。
  flow:
#    categorical:
#      - protocol
#      - has_init_win_bytes_forward
#      - has_init_win_bytes_backward
    numerical:
#      - source_port
#      - destination_port
      - flow_duration
      - total_fwd_packets
      - total_backward_packets
      - total_length_of_fwd_packets
      - total_length_of_bwd_packets
      - fwd_packet_length_max
      - fwd_packet_length_min
      - fwd_packet_length_mean
      - fwd_packet_length_std
      - bwd_packet_length_max
      - bwd_packet_length_min
      - bwd_packet_length_mean
      - bwd_packet_length_std
      - flow_bytes_per_s
      - flow_packets_per_s
      - flow_iat_mean
      - flow_iat_std
      - flow_iat_max
      - flow_iat_min
      - fwd_iat_total
      - fwd_iat_mean
      - fwd_iat_std
      - fwd_iat_max
      - fwd_iat_min
      - bwd_iat_total
      - bwd_iat_mean
      - bwd_iat_std
      - bwd_iat_max
      - bwd_iat_min
      - fwd_psh_flags
      - bwd_psh_flags
      - fwd_urg_flags
      - bwd_urg_flags
      - fwd_header_length
      - bwd_header_length
      - fwd_packets_per_s
      - bwd_packets_per_s
      - min_packet_length
      - max_packet_length
      - packet_length_mean
      - packet_length_std
      - packet_length_variance
      - fin_flag_count
      - syn_flag_count
      - rst_flag_count
      - psh_flag_count
      - ack_flag_count
      - urg_flag_count
      - cwe_flag_count
      - ece_flag_count
      - down_up_ratio
      - average_packet_size
      - avg_fwd_segment_size
      - avg_bwd_segment_size
      - init_win_bytes_forward
      - init_win_bytes_backward
      - act_data_pkt_fwd
      - min_seg_size_forward
      - active_mean
      - active_std
      - active_max
      - active_min
      - idle_mean
      - idle_std
      - idle_max
      - idle_min
    binary:
      - has_init_win_bytes_forward
      - has_init_win_bytes_backward

preprocessing:
  numerical:
    scaler: standard     # 可选: standard / robust / none

    clip:
      enabled: true
      lower_quantile: 0.001
      upper_quantile: 0.999

    log1p:
      packet:
        - pkt_len
        - ip_len
        - payload_len
        - tcp_window
        - tcp_header_len
        - udp_len

      flow:
        - flow_duration
        - total_fwd_packets
        - total_backward_packets
        - total_length_of_fwd_packets
        - total_length_of_bwd_packets
        - fwd_packet_length_max
        - fwd_packet_length_min
        - fwd_packet_length_mean
        - fwd_packet_length_std
        - bwd_packet_length_max
        - bwd_packet_length_min
        - bwd_packet_length_mean
        - bwd_packet_length_std
        - flow_bytes_per_s
        - flow_packets_per_s
        - flow_iat_mean
        - flow_iat_std
        - flow_iat_max
        - flow_iat_min
        - fwd_iat_total
        - fwd_iat_mean
        - fwd_iat_std
        - fwd_iat_max
        - fwd_iat_min
        - bwd_iat_total
        - bwd_iat_mean
        - bwd_iat_std
        - bwd_iat_max
        - bwd_iat_min
        - fwd_header_length
        - bwd_header_length
        - fwd_packets_per_s
        - bwd_packets_per_s
        - min_packet_length
        - max_packet_length
        - packet_length_mean
        - packet_length_std
        - packet_length_variance
        - average_packet_size
        - avg_fwd_segment_size
        - avg_bwd_segment_size
        - init_win_bytes_forward
        - init_win_bytes_backward
        - act_data_pkt_fwd
        - active_mean
        - active_std
        - active_max
        - active_min
        - idle_mean
        - idle_std
        - idle_max
        - idle_min


model:
  d_model: 128
  nhead: 8
  num_layers: 2
  dim_feedforward: 256
  dropout: 0.3 # 增加dropout防止过拟合

  # Ablation switches:
  # no time-aware: use_time_encoding=false
  # no position:   use_positional_encoding=false
  use_positional_encoding: true
  use_time_encoding: true

#  classifier:
#    hidden_dims: [ 64 ]
#    activation: gelu
#    dropout: 0.05
#    norm: layernorm

training:
  epochs: 1000
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.0005
  num_workers: 0
  focal_gamma: 2.0
  early_stop_patience: 50
  monitor_metric: f1_label1
  monitor_mode: max

  # 新增配置
  label_smoothing: 0.1  # 标签平滑系数
  threshold_search: true  # 是否搜索最优阈值
#  monitor_metric: f1_label1 / weighted_f1 / macro_f1
