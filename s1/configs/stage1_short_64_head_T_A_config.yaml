# Stage1 configuration - 优化版（精简Flow特征）
# 从60+流特征精简到24个核心特征，减少冗余，提升训练效率

seed: 42
strict_schema: false

data:
  flow_id_col: flow_id
  label_col: label
  packet_time_col: timestamp_us
  packet_iat_col: flow_iat_us

sequence:
  max_seq_len: 64
  # options: head, head_tail, random
  strategy: head

split:
  train_size: 0.70
  val_size: 0.10
  test_size: 0.20
  stratify: true

features:
  # 绝对时间字段一般不推荐作为模型输入，避免数据泄漏。
  # flow_iat_us 会被转为 log1p 后用于 temporal feature 和 time-aware encoding。
  packet:
    categorical:
      - ip_version
      - protocol
      - l7_proto
      - icmp_type
      - icmp_code
    numerical:
      - pkt_len
      - ip_len
      - payload_len
      - ttl_or_hop_limit
      - tcp_window
      - tcp_header_len
      - udp_len
      - log_flow_iat_us
    binary:
      - direction
      - has_tcp
      - has_udp
      - has_icmp
      - tcp_fin
      - tcp_syn
      - tcp_rst
      - tcp_psh
      - tcp_ack_flag
      - tcp_urg
      - tcp_ece
      - tcp_cwr

  # ============================================================
  # 精选流特征：从60+精简到24个，保留最具区分度的特征
  # ============================================================
  flow:
    # 分类特征：移除（协议信息已在包级特征中覆盖）
    # categorical:
    #   - protocol  # 已在packet中使用

    # ========== 核心流量特征 (8个) ==========
    numerical:
      # 流量基础指标（高信息量）
      - flow_duration               # 流持续时间：恶意流量时长异常
      - total_fwd_packets           # 前向包数：请求模式
      - total_backward_packets      # 后向包数：响应模式
      - total_length_of_fwd_packets # 前向字节数：上传/扫描
      - total_length_of_bwd_packets # 后向字节数：下载/数据窃取

      # 流量速率指标（高区分度）
      - flow_bytes_per_s            # 字节速率：DDoS vs 正常
      - flow_packets_per_s          # 包速率：流量突发检测

      # 流量对称性（恶意流量关键特征）
      - down_up_ratio               # 下行/上行比：C&C通常不对称

      # ========== 时间模式特征 (4个) ==========
      - flow_iat_mean               # 平均包间隔：规律性检测
      - flow_iat_std                # 包间隔变化：异常模式
      - fwd_iat_mean                # 前向包间隔：发送模式
      - bwd_iat_mean                # 后向包间隔：响应模式

      # ========== 包大小统计 (4个) ==========
      - packet_length_mean          # 平均包长：恶意流量常有特征
      - packet_length_std           # 包长标准差：探测行为
      - max_packet_length           # 最大包：大数据传输检测
      - average_packet_size         # 平均包大小：行为特征

      # ========== TCP标志位统计 (4个) ==========
      - syn_flag_count              # SYN标志数：扫描/洪水检测（关键）
      - fin_flag_count              # FIN标志数：连接终止模式
      - rst_flag_count              # RST标志数：异常连接重置
      - psh_flag_count              # PSH标志数：数据传输特征

      # ========== 前向段大小 (2个) ==========
      - avg_fwd_segment_size        # 前向数据段大小：上传行为
      - avg_bwd_segment_size        # 后向数据段大小：下载行为

      # ========== 初始窗口大小 (2个) ==========
      - init_win_bytes_forward      # 前向初始窗口：TCP行为特征
      - init_win_bytes_backward     # 后向初始窗口：协议行为

    binary:
      - has_init_win_bytes_forward
      - has_init_win_bytes_backward
  flow_fusion:
    # 方案A: [packet_feats; flow_feats_tiled] → 每个packet都包含flow信息
    enabled: true
    inject_to_packets: true   # true=拼接到packet
    method: "concat"           # 方案A不需要此参数，但保持兼容  concat, add, gated
    #方案B [packet_feats] → 不使用flow信息
#    "enabled": False,
#    "inject_to_packets": False,
#    "method": "none",
    #方案C-[packet_feats] + [flow_feats_separate] → 通过融合层注入
#    "enabled": True,
#    "inject_to_packets": False,
#    "method": "gated",
preprocessing:
  numerical:
    scaler: standard     # 可选: standard / robust / none

    clip:
      enabled: true
      lower_quantile: 0.001
      upper_quantile: 0.999

    log1p:
      # 包级特征：保留原有配置
      packet:
        - pkt_len
        - ip_len
        - payload_len
        - tcp_window
        - tcp_header_len
        - udp_len

      # 流级特征：精简后的log1p配置
      flow:
        # 核心流量特征
        - flow_duration
        - total_fwd_packets
        - total_backward_packets
        - total_length_of_fwd_packets
        - total_length_of_bwd_packets
        - flow_bytes_per_s
        - flow_packets_per_s
        - down_up_ratio

        # 时间模式特征
        - flow_iat_mean
        - flow_iat_std
        - fwd_iat_mean
        - bwd_iat_mean

        # 包大小统计
        - packet_length_mean
        - packet_length_std
        - max_packet_length
        - average_packet_size

        # 段大小
        - avg_fwd_segment_size
        - avg_bwd_segment_size

        # 初始窗口
        - init_win_bytes_forward
        - init_win_bytes_backward

        # 标志位不进行log1p（因为这些是计数，不是重尾分布）

model:
  d_model: 128          # 回退到128（数据量不足以支撑256）
  nhead: 8
  num_layers: 2         # 回退到2层（减少过拟合）
  dim_feedforward: 512  # 回退到512
  dropout: 0.3          # 增加dropout防止过拟合
  use_positional_encoding: false
  use_time_encoding: true
  # 新增：时间编码配置
  time_encoding:
    alpha: 1.0e-07  # 平滑因子（论文默认值

training:
  epochs: 1000
  batch_size: 64
  lr: 0.0003            # 降低学习率（更稳定的训练）
  weight_decay: 0.0005  # 增加权重衰减（防止过拟合）
  num_workers: 0
  focal_gamma: 2.0      # 恢复到2.0（极度不平衡数据需要）
  early_stop_patience: 40  # 增加patience（给模型更多时间）
  monitor_metric: f1_label1
  monitor_mode: max
  label_smoothing: 0.05  # 适度标签平滑
  threshold_search: true